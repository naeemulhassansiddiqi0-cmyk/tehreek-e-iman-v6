<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کراچی نماز اوقات</title>
<style>
  body { font-family: 'Jameel Noori Nastaleeq', Arial; background: #e8f5e9; margin: 0; padding: 20px; text-align: center; }
 .poster {
    max-width: 500px;
    margin: 0 auto 20px auto;
    background: linear-gradient(135deg, #004d40, #00695c);
    color: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
 .poster h1 { margin: 0 0 10px 0; font-size: 28px; color: gold; }
 .date { font-size: 16px; margin-bottom: 20px; opacity: 0.9; }
 .loading { font-size: 16px; opacity: 0.8; }
 .times { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 20px; }
 .time-box { background: rgba(255,255,255,0.15); padding: 12px; border-radius: 10px; }
 .time-box span { display: block; font-size: 14px; opacity: 0.8; }
 .link-box {
    max-width: 500px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px #ccc;
  }
 .link-box a {
    display: block;
    background: #c62828;
    color: white;
    text-decoration: none;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 10px;
  }
 .link-box a:hover { background: #b71c1c; }
 .note { font-size: 14px; color: #555; margin-top: 10px; }
</style>
</head>
<body>

  <!-- اوپر: کراچی کا Auto Poster -->
  <div class="poster">
    <h1>کراچی - نماز کے اوقات</h1>
    <div class="date" id="today-date">لوڈ ہو رہا ہے...</div>
    <div id="times-area"><div class="loading">اوقات لائے جا رہے ہیں...</div></div>
  </div>

  <!-- نیچے: سارے پاکستان کا Link -->
  <div class="link-box">
    <a href="https://naeemulhassansiddiqi0-cmyk.github.io/tehreek-e-iman-v6/" target="_blank">
      📍 پاکستان کے تمام شہروں کے اوقات دیکھیں
    </a>
    <p class="note">اوپر کلک کریں اور اپنا شہر سلیکٹ کریں</p>
  </div>

<script>
  // 1. آج کی تاریخ اردو میں
  const dateEl = document.getElementById('today-date');
  const today = new Date().toLocaleDateString('ur-PK', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  dateEl.textContent = today;

  // 2. کراچی کے اوقات API سے لانا - روز خودبخود
  const lat = 24.8607; // کراچی کا Latitude
  const lon = 67.0011; // کراچی کا Longitude
  const todayStr = new Date().toISOString().split('T')[0]; // 2026-04-05 فارمیٹ

  fetch(`https://api.aladhan.com/v1/timings/${todayStr}?latitude=${lat}&longitude=${lon}&method=1`)
   .then(res => res.json())
   .then(data => {
      const t = data.data.timings;
      document.getElementById('times-area').innerHTML = `
        <div class="times">
          <div class="time-box"><span>فجر</span> <b>${t.Fajr}</b></div>
          <div class="time-box"><span>ظہر</span> <b>${t.Dhuhr}</b></div>
          <div class="time-box"><span>عصر</span> <b>${t.Asr}</b></div>
          <div class="time-box"><span>مغرب</span> <b>${t.Maghrib}</b></div>
          <div class="time-box"><span>عشاء</span> <b>${t.Isha}</b></div>
          <div class="time-box"><span>اشراق</span> <b>${t.Sunrise}</b></div>
        </div>
      `;
    })
   .catch(err => {
      document.getElementById('times-area').innerHTML = `<p>اوقات لوڈ نہیں ہو سکے۔ انٹرنیٹ چیک کریں۔</p>`;
    });
</script>

</body>
</html>
