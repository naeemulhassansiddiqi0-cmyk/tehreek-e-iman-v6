<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحریکِ ایمان V6</title>
<style>
body{font-family:'Jameel Noori Nastaleeq',Arial,sans-serif;background:#f0f0f0;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#004d40;color:white;padding:30px;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,0.3);text-align:center;max-width:400px;width:90%}
.card h1{color:gold;margin:0 0 10px;font-size:28px}
.date{margin-bottom:20px;font-size:16px;opacity:0.9}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.box{background:#00695c;padding:15px;border-radius:12px}
.box .name{font-size:18px;font-weight:bold;display:block}
.box .time{font-size:22px;margin-top:5px;display:block}
.btn{display:block;background:#c62828;color:white;text-decoration:none;padding:14px;margin-top:20px;border-radius:10px;font-size:17px;font-weight:bold}
</style>
</head>
<body>
<div class="card">
  <h1>کراچی - نماز کے اوقات</h1>
  <div class="date" id="date"></div>
  <div class="grid" id="times">لوڈ ہو رہا ہے...</div>
  <a class="btn" href="https://naeemulhassansiddiqi0-cmyk.github.io/tehreek-e-iman-v6/cities.html" target="_blank">📍 پاکستان کے تمام شہر</a>
</div>
<script>
document.getElementById('date').textContent=new Date().toLocaleDateString('ur-PK',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
function to12(t){const[h,m]=t.split(':');const H=+h;return`${H%12||12}:${m} ${H>=12?'PM':'AM'}`}
fetch(`https://api.aladhan.com/v1/timings/${new Date().toISOString().split('T')[0]}?latitude=24.8607&longitude=67.0011&method=1`)
.then(r=>r.json()).then(d=>{const t=d.data.timings;
document.getElementById('times').innerHTML=`
<div class="box"><span class="name">فجر</span><span class="time">${to12(t.Fajr)}</span></div>
<div class="box"><span class="name">ظہر</span><span class="time">${to12(t.Dhuhr)}</span></div>
<div class="box"><span class="name">عصر</span><span class="time">${to12(t.Asr)}</span></div>
<div class="box"><span class="name">مغرب</span><span class="time">${to12(t.Maghrib)}</span></div>
<div class="box"><span class="name">عشاء</span><span class="time">${to12(t.Isha)}</span></div>
<div class="box"><span class="name">اشراق</span><span class="time">${to12(t.Sunrise)}</span></div>`;})
.catch(()=>{document.getElementById('times').innerHTML='انٹرنیٹ چیک کریں';});
</script>
</body>
</html>
