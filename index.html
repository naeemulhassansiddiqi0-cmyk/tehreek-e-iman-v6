<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحریک ایمان - نماز کے اوقات</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--text:#f8fafc;--muted:#94a3b8;--accent:#22d3ee;--accent2:#a78bfa;--green:#34d399;--gold:#fbbf24;--r:18px;--sh:0 10px 30px rgba(0,0,0,.25)}
*{box-sizing:border-box}
body{font-family:'Noto Nastaliq Urdu',serif;background:var(--bg);color:var(--text);min-height:100vh;margin:0;direction:rtl}
.wrap{max-width:680px;margin:0 auto;padding:16px;padding-bottom:40px}
header{background:var(--card);padding:18px 20px;display:flex;align-items:center;justify-content:center;gap:14px;border-radius:var(--r);margin-bottom:16px}
header img{width:70px;height:70px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;flex-shrink:0}
.header-text{text-align:right}
.header-text h1{font-size:clamp(22px,4vw,30px);color:var(--gold);line-height:1.3;margin:0}
.header-text .sub{font-size:clamp(13px,2vw,16px);color:var(--muted);margin-top:8px}
.header-text .name{font-size:clamp(12px,2vw,14px);color:var(--gold);margin-top:4px;font-weight:700}
.card{background:var(--card);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);margin-bottom:12px}
.card-label{font-size:12px;color:var(--muted);text-align:right;margin-bottom:8px}
#citySelect,input{width:100%;padding:12px 14px;font-size:16px;border-radius:12px;font-family:inherit;direction:rtl;background:var(--card);color:var(--text);border:1px solid var(--accent2)}
button{padding:12px 14px;font-size:16px;border-radius:12px;font-family:inherit;border:0;cursor:pointer;font-weight:700}
button.add-btn{width:100%;background:var(--accent2);margin-top:8px}
.row{display:flex;gap:8px}
.row input{flex:1}
.row button.add-btn{width:auto;flex:0 0 80px;background:var(--green);margin-top:0}
.box{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px dashed rgba(255,255,255,.1);gap:8px}
.box:last-child{border-bottom:0}
.name{font-weight:700;flex:1;text-align:right}
.time{opacity:.9;min-width:90px;text-align:left}
.btns{display:flex;gap:6px}
.alarm-btn{width:auto;padding:6px 12px;font-size:13px;background:var(--accent);border-radius:8px;margin:0;color:#000}
.azan-btn{width:auto;padding:6px 12px;font-size:13px;background:var(--gold);color:#000;border-radius:8px;margin:0}
.azan-btn.active{background:#ef4444;color:#fff}
.custom{color:var(--green)}
</style>
</head>
<body>
<div class="wrap">
<header>
<img src="logo.png" alt="logo">
<div class="header-text">
<h1>تحریک ایمان</h1>
<p class="sub">روزانہ نماز کے اوقات</p>
<p class="name">محمد نعیم الحسن صدیقی</p>
</div>
</header>

<div class="card">
<div class="card-label">شہر منتخب کریں</div>
<select id="citySelect">
<option value="Karachi">کراچی</option>
<option value="Lahore">لاہور</option>
<option value="Islamabad">اسلام آباد</option>
<option value="Peshawar">پشاور</option>
<option value="Quetta">کوئٹہ</option>
<option value="Multan">ملتان</option>
<option value="Faisalabad">فیصل آباد</option>
<option value="Rawalpindi">راولپنڈی</option>
<option value="Sialkot">سیالکوٹ</option>
<option value="Bahawalpur">بہاولپور</option>
<option value="Sargodha">سرگودھا</option>
<option value="Gujranwala">گوجرانوالہ</option>
<option value="Hyderabad">حیدرآباد</option>
<option value="Sukkur">سکھر</option>
<option value="Abbottabad">ایبٹ آباد</option>
</select>
</div>

<div class="card">
<div class="card-label">اپنا ٹائم Add کریں</div>
<div class="row">
<input id="customName" placeholder="نام لکھیں: جیسے تہجد">
<input id="customTime" type="time">
<button class="add-btn" onclick="addCustom()">Add</button>
</div>
</div>

<div class="card" id="times"></div>
</div>

<audio id="azanAudio" src="azan.mp3" preload="auto" playsinline></audio>

<script>
const to12=x=>{const[h,m]=x.split(':');const H=+h;return`${H%12||12}:${m} ${H>=12?'PM':'AM'}`};
const addMins=(time,mins)=>{let[h,m]=time.split(':').map(Number);let d=new Date();d.setHours(h,m+mins);return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`};
let allTimes=[];
const azan=document.getElementById('azanAudio');
let isAzanPlaying=false;

Notification.requestPermission();

function speak(text){
if('speechSynthesis' in window){
const u=new SpeechSynthesisUtterance(text);
u.lang='ur-PK';
speechSynthesis.speak(u);
}
if(Notification.permission==='granted'){
new Notification('نماز کا وقت', {body:text});
}
}

function playAzan(btn){
if(isAzanPlaying){
azan.pause();
azan.currentTime=0;
btn.classList.remove('active');
btn.innerHTML='🔈 ازان';
isAzanPlaying=false;
}else{
azan.currentTime=0; 
azan.play().then(()=>{
btn.classList.add('active');
btn.innerHTML='⏹️ بند کریں';
isAzanPlaying=true;
}).catch(e=>alert('پہلے سکرین کو 1 بار Touch کریں پھر ازان دبائیں'));
}
azan.onended=()=>{
document.querySelectorAll('.azan-btn').forEach(b=>{
b.classList.remove('active');
b.innerHTML='🔈 ازان';
});
isAzanPlaying=false;
}
}

function checkAlarms(){
const now=new Date();
const current=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
allTimes.forEach(t=>{
if(t.time===current && !t.rang){
speak(`${t.name} کا وقت ہو گیا ہے`);
const btn=document.querySelector('.azan-btn');
if(btn) playAzan(btn);
t.rang=true;
}
});
}

function setAlarm(name,time){
if(Notification.permission!=='granted'){Notification.requestPermission();}
const [h,m]=time.split(':');
const alarmTime=new Date();
alarmTime.setHours(+h,m,0,0);
if(alarmTime<new Date())alarmTime.setDate(alarmTime.getDate()+1);
const diff=alarmTime-new Date();
setTimeout(()=>{speak(`${name} کا وقت ہو گیا ہے`); const btn=document.querySelector('.azan-btn'); if(btn) playAzan(btn);},diff);
alert(`${name} کا Alarm ${to12(time)} پر سیٹ ہو گیا`);
}

function renderTimes(){
let html='';
allTimes.forEach(t=>{
html+=`<div class="box">
<span class="name ${t.custom?'custom':''}">${t.name}</span>
<span class="time">${to12(t.time)}</span>
<div class="btns">
<button class="azan-btn" onclick="playAzan(this)">🔈 ازان</button>
<button class="alarm-btn" onclick="setAlarm('${t.name}','${t.time}')">Alarm</button>
</div>
</div>`;
});
document.getElementById('times').innerHTML=html;
}

function addCustom(){
const name=document.getElementById('customName').value;
const time=document.getElementById('customTime').value;
if(!name||!time){alert('نام اور ٹائم لکھیں');return;}
allTimes.push({name,time,custom:true,rang:false});
renderTimes();
document.getElementById('customName').value='';
document.getElementById('customTime').value='';
}

function showTimings(city){
fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Pakistan&method=1`)
.then(r=>r.json()).then(d=>{const t=d.data.timings;
const sunrise=t.Sunrise; const dhuhr=t.Dhuhr; const maghrib=t.Maghrib;
const ishraq=addMins(sunrise,20); const chasht=addMins(sunrise,45); const zawal=addMins(dhuhr,-10); const awabeen=addMins(maghrib,20);
const sehri=addMins(t.Fajr,-10); const iftar=maghrib;

allTimes=[
{name:'فجر',time:t.Fajr,rang:false},
{name:'ظہر',time:dhuhr,rang:false},
{name:'عصر',time:t.Asr,rang:false},
{name:'مغرب',time:maghrib,rang:false},
{name:'عشاء',time:t.Isha,rang:false},
{name:'سحری',time:sehri,rang:false},
{name:'افطاری',time:iftar,rang:false},
{name:'طلوع آفتاب',time:sunrise,rang:false},
{name:'اشراق',time:ishraq,rang:false},
{name:'چاشت',time:chasht,rang:false},
{name:'زوال',time:zawal,rang:false},
{name:'اوابین',time:awabeen,rang:false}
];
renderTimes();
});
}

document.getElementById('citySelect').addEventListener('change',e=>showTimings(e.target.value));
showTimings('Karachi');
setInterval(checkAlarms,60000);
</script>
</body>
</html>
